<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CITYMEMORY90</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

   <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
}

/* #splash-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center,
        #6a00ff 0%,
        #1a0033 30%,
        #000000 70%
    );
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.5s ease; 
    }  */

#splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    height: 100dvh; /* FIX mobile moderno */
    background: radial-gradient(circle at center,
        #6a00ff 0%,
        #1a0033 40%,
        #000000 80%
    );
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

    /* CRT EFFECT */
    #splash-screen::before {
        content: " ";
        position: absolute;
        inset: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
        ),
        linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
        );
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
    }

    .title-container {
        text-align: center;
        margin-bottom: 50px;
        transform: skewX(-10deg);
    }

    .title-main {
        font-size: 48px;
        font-weight: 900;
        color: #00ffff;
        letter-spacing: 4px;
        text-shadow: 3px 3px 0px #ff00ff, 6px 6px 0px #000;
        margin: 0;
    }

    .title-sub {
        font-size: 18px;
        color: #ffff00;
        margin-top: 10px;
        text-shadow: 2px 2px 0px #ff0000;
    }

    #start-btn {
        padding: 15px 40px;
        font-size: 22px;
        font-weight: bold;
        color: #fff;
        background: #00ff00;
        border: 4px solid #fff;
        box-shadow: 5px 5px 0px #ff00ff;
        cursor: pointer;
        text-transform: uppercase;
    }

    #start-btn:active {
        transform: translate(4px, 4px);
        box-shadow: 1px 1px 0px #ff00ff;
    }

    .loading-text {
        color: #fff;
        margin-top: 30px;
        font-size: 12px;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<div id="splash-screen">
    <div class="title-container">
        <h1 class="title-main">CITYMEMORY90</h1>
        <div class="title-sub">by Diego Capani</div>
    </div>
    <button id="start-btn">REMEMBER NOW!</button>
    <div class="loading-text">INSERT COIN TO PLAY...</div>
</div>

<a-scene embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

    <a-assets>
        <a-asset-item id="modello-1" src="assets/renault.glb"></a-asset-item>
        <a-asset-item id="modello-2" src="assets/renault.glb"></a-asset-item>
        <a-asset-item id="modello-3" src="assets/renault.glb"></a-asset-item>
        <a-asset-item id="modello-4" src="assets/renault.glb"></a-asset-item>
    </a-assets>

    <a-marker type="barcode" value="1">
        <a-entity gltf-model="#modello-1" scale="1 1 1" position="0 0 0" rotation="0 0 0"></a-entity>

        <a-plane rotation="-90 0 0" width="4" height="4" position="0 0 0"
            material="src: assets/ombra.png; transparent: true; opacity: 0.6">
        </a-plane>
    </a-marker>

    <a-marker type="barcode" value="2">
        <a-entity gltf-model="#modello-2" scale="3 3 3" position="0 0 0" rotation="0 0 0"></a-entity>

           <a-plane rotation="-90 0 0" width="4" height="4" position="0 -0.5 0"
            material="src: assets/ombra.png; transparent: true; opacity: 0.6">
        </a-plane>
    </a-marker>

    <a-marker type="barcode" value="3">
        <a-entity gltf-model="#modello-3" scale="3 3 3" position="0 0 0" rotation="90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>
    </a-marker>

    <a-marker type="barcode" value="4" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">
        <a-entity gltf-model="#modello-4" scale="0.01 0.01 0.01" position="0 0 0" rotation="0 0 0"></a-entity>

        <a-plane rotation="-90 0 0" width="8" height="8" position="0 0 0"
            material="src: assets/ombra.png; transparent: true; opacity: 0.6">
        </a-plane>
    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const startBtn = document.getElementById('start-btn');
    const splash = document.getElementById('splash-screen');
    const scene = document.querySelector('a-scene');

    startBtn.addEventListener('click', async () => {

        // avvia AR / camera context
        if (scene) {
            scene.play();
        }

        // fade out splash
        splash.style.opacity = '0';

        // rimuove completamente la splash dopo animazione
        setTimeout(() => {
            splash.style.display = 'none';
        }, 500);

    });

});
</script>

</body>
</html>
