<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR Renault 4</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }

  #msg {
    position: absolute;
    z-index: 10;
    color: white;
    font-family: Arial;
    padding: 10px;
  }
</style>
</head>

<body>

<div id="msg">Avvio camera...</div>
<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene, camera, renderer, controls;
let video, videoTexture;

init();

async function init() {

  video = document.getElementById("video");
  const msg = document.getElementById("msg");

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

    msg.innerText = "Camera attiva ✔";

  } catch (err) {

    console.error(err);
    msg.innerText = "Errore camera ❌";

  }

  init3D();

}

function init3D() {

  // SCENA
  scene = new THREE.Scene();

  // CAMERA
  camera = new THREE.PerspectiveCamera(
    50,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 1.6, 6);

  // RENDERER
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // LUCI (IMPORTANTISSIMO PER VEDERE IL MODELLO)
  const light1 = new THREE.DirectionalLight(0xffffff, 1.5);
  light1.position.set(5, 10, 5);
  scene.add(light1);

  const light2 = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(light2);

  // CONTROLS (orbit umano)
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.5, 0);
  controls.update();

  controls.enableZoom = false;
  controls.enablePan = false;
  controls.minDistance = 5;
  controls.maxDistance = 5;
  controls.enableDamping = true;

  // MODELLO
  loadModel();

  animate();

}

function loadModel() {

  const loader = new THREE.GLTFLoader();

  loader.load(
    "renault.glb",

    (gltf) => {

      const car = gltf.scene;

      // CENTRATURA PERFETTA
      const box = new THREE.Box3().setFromObject(car);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      car.position.sub(center);

      // SCALA AUTOMATICA (evita invisibilità)
      const maxSize = Math.max(size.x, size.y, size.z);
      const scale = 3 / maxSize;
      car.scale.setScalar(scale);

      scene.add(car);

      console.log("RENAULT CARICATA ✔");

    },

    undefined,

    (err) => {
      console.error("ERRORE GLB ❌", err);
    }

  );

}

function animate() {

  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);

}

window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
