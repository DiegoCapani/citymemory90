<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR FIX OGGETTO</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }

  #msg {
    position: absolute;
    z-index: 10;
    color: white;
    font-family: Arial;
    padding: 10px;
  }
</style>
</head>

<body>

<div id="msg">OGGETTO FIX</div>
<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene, camera, renderer, controls;

start();

async function start() {

  const video = document.getElementById("video");

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;
    await video.play();

  } catch (e) {
    console.error(e);
  }

  init3D();
}

function init3D() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(0, 2, 4);

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // luce base
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light);

  // pavimento
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshStandardMaterial({ color: 0x444444 })
  );

  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // 🔥 OGGETTO (FORZATO VISIBILE)
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshBasicMaterial({ color: 0xff0000 }) // NON dipende da luci
  );

  cube.position.set(0, 0.5, 0);   // sopra il pavimento
  cube.scale.set(2, 2, 2);        // grande = impossibile non vederlo

  scene.add(cube);

  // punto di riferimento extra (debug visivo)
  const axis = new THREE.AxesHelper(2);
  scene.add(axis);

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  controls.target.set(0, 0.5, 0);
  controls.update();

  controls.enableZoom = false;
  controls.enablePan = false;

  animate();
}

function animate() {

  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);

}

window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
