<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Renault AR - Stable</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}
</style>
</head>

<body>

<a-scene
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true; colorManagement: true; physicallyCorrectLights: true;"
  arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

  <!-- 💡 LUCI REALISTICHE -->
  <a-entity light="type: ambient; intensity: 0.9"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 4 3"></a-entity>

  <!-- 🎯 MARKER HIRO -->
  <a-marker preset="hiro">

    <!-- 🟫 PAVIMENTO OMBRA -->
    <a-plane
      rotation="-90 0 0"
      width="4"
      height="4"
      material="color: #111; opacity: 0.55; roughness: 1">
    </a-plane>

    <!-- 🚗 MODELLO AUTO -->
    <a-entity
      gltf-model="url(renault.glb)"
      position="0 0 0"
      rotation="0 180 0"
      scale="0.8 0.8 0.8"
      shadow="cast: true; receive: true">
    </a-entity>

  </a-marker>

  <!-- 📷 CAMERA FIXATA (NO ZOOM STRANO) -->
  <a-entity
    camera="fov: 55; near: 0.01; far: 2000"
    look-controls="enabled: false">
  </a-entity>

</a-scene>

</body>
</html>
