<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WEBGL DIAGNOSTIC</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: Arial;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    padding: 10px;
  }

  canvas {
    display: block;
  }
</style>
</head>

<body>

<div id="status">INIT...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const status = document.getElementById("status");

try {

  status.innerText = "Creazione scena...";

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.z = 3;

  status.innerText = "Creazione renderer...";

  const renderer = new THREE.WebGLRenderer({ antialias: true });

  if (!renderer) {
    throw new Error("Renderer NON creato (WebGL non disponibile)");
  }

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x333333);

  document.body.appendChild(renderer.domElement);

  status.innerText = "Creazione cubo...";

  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );

  scene.add(cube);

  status.innerText = "OK - rendering attivo ✔";

  function animate() {

    requestAnimationFrame(animate);

    cube.rotation.y += 0.01;

    renderer.render(scene, camera);

  }

  animate();

} catch (err) {

  console.error(err);
  status.innerText = "ERRORE: " + err.message;

}

window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
