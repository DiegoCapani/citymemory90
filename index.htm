<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D SAFE TEST</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #202020; /* se canvas fallisce, almeno vedi qualcosa */
  }

  canvas {
    display: block;
  }

  #msg {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    z-index: 10;
  }
</style>
</head>

<body>

<div id="msg">TEST 3D</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

console.log("SCRIPT PARTITO ✔");

let scene, camera, renderer, controls;

init();
animate();

function init() {

  // SCENA
  scene = new THREE.Scene();

  // CAMERA
  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(2, 2, 5);

  // RENDERER (FORZATO VISIBILE)
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x444444); // IMPORTANTISSIMO
  document.body.appendChild(renderer.domElement);

  console.log("RENDERER OK ✔");

  // LUCE MINIMA (SICURA)
  const light = new THREE.AmbientLight(0xffffff, 1);
  scene.add(light);

  // CUBO (TEST ASSOLUTO)
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshBasicMaterial({ color: 0xff0000 }) // NO LUCI = SEMPRE VISIBILE
  );

  scene.add(cube);

  console.log("CUBO AGGIUNTO ✔");

  // ORBIT CONTROLS
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.update();

  controls.enableZoom = false;

  window.addEventListener("resize", onResize);
}

function animate() {

  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);

}

function onResize() {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

}

</script>

</body>
</html>
